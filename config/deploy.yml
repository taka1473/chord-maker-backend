# Name of your application. Used to uniquely configure containers.
service: chordlet-backend

# Name of the container image.
# TODO: YOUR_GITHUB_USERNAME を実際の GitHub ユーザー名に変更
image: ghcr.io/taka1473/chordlet-backend

# Deploy to these servers.
servers:
  web:
    # TODO: Compute Engine の外部 IP アドレスに変更
    - 136.113.210.132

# Enable SSL auto certification via Let's Encrypt.
# TODO: 取得したドメインに変更
proxy:
  ssl: true
  host: chord-let.com

# Credentials for your image host (GitHub Container Registry).
registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - LITESTREAM_GCS_BUCKET
  clear:
    RAILS_ENV: production
    RAILS_LOG_LEVEL: info
    SOLID_QUEUE_IN_PUMA: true

# Aliases for common commands.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Mount persistent storage for SQLite databases.
volumes:
  - "chordlet_backend_storage:/rails/storage"

# Bridge fingerprinted assets between versions.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  dockerfile: Dockerfile.prod
